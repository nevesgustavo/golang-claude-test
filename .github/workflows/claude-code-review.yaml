name: Claude Code Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Pull Request number to review'
        required: true
        type: number
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  code-review:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event.issue.pull_request && contains(github.event.comment.body, '/claude-review'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v41

      - name: Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are conducting a comprehensive code review as a senior Go architect.
            
            REVIEW CHECKLIST:
            
            🔒 SECURITY (CRITICAL):
            - [ ] No hardcoded credentials, API keys, or secrets
            - [ ] All user inputs validated and sanitized
            - [ ] No SQL injection vulnerabilities
            - [ ] Error messages don't leak sensitive information
            - [ ] Proper authentication/authorization checks
            
            ✅ TESTING (HIGH):
            - [ ] Unit tests for all new functions
            - [ ] Test coverage >= 80%
            - [ ] Error cases tested
            - [ ] Edge conditions covered
            - [ ] Table-driven tests used where appropriate
            
            ⚠️ ERROR HANDLING (HIGH):
            - [ ] No ignored errors (_ = err)
            - [ ] Errors wrapped with context (fmt.Errorf with %w)
            - [ ] No panics in library code
            - [ ] All error paths tested
            
            📚 DOCUMENTATION (REQUIRED):
            - [ ] Godoc comments for all exported functions/types
            - [ ] Complex logic explained
            - [ ] Examples provided for non-trivial APIs
            
            ⚡ PERFORMANCE:
            - [ ] No unnecessary allocations in hot paths
            - [ ] Resources properly closed (defer used)
            - [ ] No goroutine leaks
            - [ ] Efficient algorithms used
            
            🏗️ CODE QUALITY:
            - [ ] Functions < 50 lines
            - [ ] Meaningful variable names
            - [ ] No code duplication
            - [ ] Single Responsibility Principle followed
            
            OUTPUT FORMAT:
            1. **Verdict**: LGTM / Needs Work / Critical Issues
            2. **Critical Issues** (🔴): List blocking issues
            3. **High Priority** (🟡): List important improvements
            4. **Suggestions** (🟢): List nice-to-have improvements
            5. **Positive Feedback**: Highlight good practices
            
            Provide code examples for suggestions. Be educational and constructive.
      
      - name: Post Cost Estimate
        if: steps.claude-review.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            // Estimate tokens for comprehensive review
            const promptTokens = 1000;  // Comprehensive prompt ~1000 tokens
            const codeTokens = 500;     // Medium PR ~500 tokens
            const responseTokens = 800;  // Detailed response ~800 tokens
            
            const inputTokens = promptTokens + codeTokens;
            const outputTokens = responseTokens;
            
            // Claude 3.5 Sonnet pricing
            const inputCost = (inputTokens / 1000000) * 3;
            const outputCost = (outputTokens / 1000000) * 15;
            const totalCost = inputCost + outputCost;
            
            const comment = `## 💰 Code Review Cost Estimate
            
            **Workflow:** Comprehensive Code Review (/claude-review)
            **Status:** ${{ steps.claude-review.outcome || 'completed' }}
            
            ### Token Usage (Estimated)
            - Input tokens: ~${inputTokens.toLocaleString()} tokens
            - Output tokens: ~${outputTokens.toLocaleString()} tokens
            - **Total tokens:** ~${(inputTokens + outputTokens).toLocaleString()} tokens
            
            ### Cost Breakdown
            - Input cost: ~$${inputCost.toFixed(4)}
            - Output cost: ~$${outputCost.toFixed(4)}
            - **Total cost:** ~$${totalCost.toFixed(4)} (~$${totalCost.toFixed(2)})
            
            ### Budget Tracking
            - Cost per comprehensive review: ~$0.15-0.50 (varies by PR size)
            - Small PR (< 100 lines): ~$0.10-0.20
            - Medium PR (100-500 lines): ~$0.20-0.50
            - Large PR (500+ lines): ~$0.50-1.00
            - With $5 budget: ~10-50 comprehensive reviews possible
            
            ---
            *💡 Tip: For cheaper reviews, use \`@claude\` with specific questions instead of full \`/claude-review\`.*
            
            *Check [Anthropic Console](https://console.anthropic.com/) for actual usage.*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
