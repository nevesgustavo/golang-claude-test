name: Claude AI Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  claude:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '@claude')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Integration
        id: claude-assistant
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a senior Go engineer with 10+ years of experience reviewing production code.
            
            REVIEW STANDARDS (see .github/CLAUDE_STANDARDS.md for full details):
            
            🔴 CRITICAL (Must Fix):
            - Security vulnerabilities (SQL injection, XSS, hardcoded secrets)
            - Data races and concurrency issues
            - Resource leaks (goroutines, connections, files)
            - Incorrect error handling leading to data loss
            
            🟡 HIGH PRIORITY (Should Fix):
            - Missing or insufficient tests (require 80% coverage)
            - Improper error handling (no ignored errors)
            - Missing documentation for exported functions
            - Performance regressions
            
            🟢 MEDIUM PRIORITY:
            - Code duplication
            - Naming improvements
            - Code complexity reduction
            
            PROVIDE:
            1. Clear verdict (LGTM, Needs Work, or Critical Issues)
            2. Actionable feedback with code examples
            3. Prioritized list of issues
            4. Suggestions for improvements
            
            Be constructive, educational, and specific. Reference Go best practices.
      
      - name: Post Cost Estimate
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            // Estimate tokens based on comment length
            const promptTokens = 600;  // Assistant prompt ~600 tokens
            const codeTokens = 150;    // Focused review ~150 tokens
            const responseTokens = 300; // Brief response ~300 tokens
            
            const inputTokens = promptTokens + codeTokens;
            const outputTokens = responseTokens;
            
            // Claude 3.5 Sonnet pricing
            const inputCost = (inputTokens / 1000000) * 3;
            const outputCost = (outputTokens / 1000000) * 15;
            const totalCost = inputCost + outputCost;
            
            const comment = `## 💰 Claude Assistant Cost Estimate
            
            **Workflow:** Claude AI Assistant (@claude mention)
            **Status:** ${{ steps.claude-assistant.outcome || 'completed' }}
            
            ### Token Usage (Estimated)
            - Input tokens: ~${inputTokens.toLocaleString()} tokens
            - Output tokens: ~${outputTokens.toLocaleString()} tokens
            - **Total tokens:** ~${(inputTokens + outputTokens).toLocaleString()} tokens
            
            ### Cost Breakdown
            - Input cost: ~$${inputCost.toFixed(4)}
            - Output cost: ~$${outputCost.toFixed(4)}
            - **Total cost:** ~$${totalCost.toFixed(4)} (~$${totalCost.toFixed(2)})
            
            ### Budget Tracking
            - Cost per @claude interaction: ~$0.05-0.10
            - With $5 budget: ~50-100 interactions possible
            
            ---
            *💡 Tip: For cheaper reviews, ask specific questions. For comprehensive reviews, use \`/claude-review\`.*
            
            *Check [Anthropic Console](https://console.anthropic.com/) for actual usage.*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
