name: Claude AI Assistant

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  claude:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add thinking reaction
        uses: actions/github-script@v7
        with:
          script: |
            const isIssue = context.payload.issue && !context.payload.issue.pull_request;
            const isPR = context.payload.issue && context.payload.issue.pull_request;
            
            if (isIssue) {
              // For issues, react to the issue itself
              await github.rest.reactions.createForIssue({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                content: 'eyes'
              });
            } else if (context.payload.comment) {
              // For comments, react to the comment
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'eyes'
              });
            }

      - name: Run Claude Code
        id: claude-assistant
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      
      - name: Post Cost Estimate
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            // Estimate based on typical usage
            const estimatedInputTokens = 1000;  // PR context + prompt
            const estimatedOutputTokens = 500;  // Claude's response
            
            // Claude 3.5 Sonnet pricing
            const inputCost = (estimatedInputTokens / 1000000) * 3;
            const outputCost = (estimatedOutputTokens / 1000000) * 15;
            const totalCost = inputCost + outputCost;
            
            const comment = `## 💰 Estimated Cost
            
            **Status:** ${{ steps.claude-assistant.outcome || 'completed' }}
            
            ### Estimated Token Usage
            - Input: ~${estimatedInputTokens.toLocaleString()} tokens
            - Output: ~${estimatedOutputTokens.toLocaleString()} tokens
            - **Total:** ~${(estimatedInputTokens + estimatedOutputTokens).toLocaleString()} tokens
            
            ### Cost Breakdown
            - Input cost: ~$${inputCost.toFixed(4)}
            - Output cost: ~$${outputCost.toFixed(4)}
            - **Total cost:** ~$${totalCost.toFixed(4)} (~$${totalCost.toFixed(2)})
            
            ### Your Budget
            - Estimated cost this interaction: ~$${totalCost.toFixed(2)}
            - Remaining budget (from $5.00): ~$${(5 - totalCost).toFixed(2)}
            
            ---
            *💡 Check exact usage at [Anthropic Console](https://console.anthropic.com/settings/usage)*`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
