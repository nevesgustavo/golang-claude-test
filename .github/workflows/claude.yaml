name: Claude AI Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  claude:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '@claude')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR Context
        id: pr-context
        uses: actions/github-script@v7
        with:
          script: |
            let prNumber, prData, files;
            
            // Get PR number from different event types
            if (context.payload.issue && context.payload.issue.pull_request) {
              prNumber = context.payload.issue.number;
            } else if (context.payload.pull_request) {
              prNumber = context.payload.pull_request.number;
            } else {
              core.setOutput('is_pr', 'false');
              return 'Not a PR';
            }
            
            // Get PR details
            prData = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            
            // Get changed files
            const filesResponse = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            
            files = filesResponse.data;
            
            // Build context
            let diffContext = `# PR #${prNumber}: ${prData.data.title}\n\n`;
            diffContext += `**Description:** ${prData.data.body || 'No description'}\n\n`;
            diffContext += `**Changed files:** ${files.length}\n\n`;
            
            for (const file of files) {
              diffContext += `## ${file.filename} (${file.status})\n`;
              if (file.patch) {
                diffContext += `\`\`\`diff\n${file.patch}\n\`\`\`\n\n`;
              }
            }
            
            core.setOutput('is_pr', 'true');
            core.setOutput('pr_number', prNumber);
            core.setOutput('diff_context', diffContext);
            return diffContext;

      - name: Call Claude API
        id: claude-assistant
        if: steps.pr-context.outputs.is_pr == 'true'
        uses: actions/github-script@v7
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          script: |
            const userComment = context.payload.comment.body;
            const diffContext = `${{ steps.pr-context.outputs.diff_context }}`;
            
            const systemPrompt = `You are a senior Go engineer with 10+ years of experience reviewing production code.

REVIEW STANDARDS:
🔴 CRITICAL (Must Fix):
- Security vulnerabilities (SQL injection, XSS, hardcoded secrets)
- Data races and concurrency issues
- Resource leaks (goroutines, connections, files)
- Incorrect error handling leading to data loss

🟡 HIGH PRIORITY (Should Fix):
- Missing or insufficient tests (require 80% coverage)
- Improper error handling (no ignored errors)
- Missing documentation for exported functions
- Performance regressions

🟢 MEDIUM PRIORITY:
- Code duplication
- Naming improvements
- Code complexity reduction

PROVIDE:
1. Clear verdict (LGTM, Needs Work, or Critical Issues)
2. Actionable feedback with code examples
3. Prioritized list of issues
4. Suggestions for improvements

Be constructive, educational, and specific. Reference Go best practices.`;
            
            const userPrompt = `User request: ${userComment}\n\nCode changes to review:\n${diffContext}`;
            
            console.log('Calling Claude API...');
            
            const response = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-api-key': process.env.ANTHROPIC_API_KEY,
                'anthropic-version': '2023-06-01'
              },
              body: JSON.stringify({
                model: 'claude-3-5-sonnet-20241022',
                max_tokens: 4096,
                system: systemPrompt,
                messages: [
                  {
                    role: 'user',
                    content: userPrompt
                  }
                ]
              })
            });
            
            if (!response.ok) {
              const errorText = await response.text();
              throw new Error(`Claude API error (${response.status}): ${errorText}`);
            }
            
            const data = await response.json();
            const analysis = data.content[0].text;
            
            console.log('Claude analysis received, posting comment...');
            
            // Post Claude's analysis
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Claude Code Review\n\n${analysis}`
            });
            
            // Store token usage for cost calculation
            core.setOutput('input_tokens', data.usage.input_tokens);
            core.setOutput('output_tokens', data.usage.output_tokens);
            
            console.log(`Token usage - Input: ${data.usage.input_tokens}, Output: ${data.usage.output_tokens}`);
            
            return analysis;
      
      - name: Post Cost Estimate
        if: steps.claude-assistant.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            // Get actual token usage from Claude API response
            const inputTokens = parseInt('${{ steps.claude-assistant.outputs.input_tokens }}') || 0;
            const outputTokens = parseInt('${{ steps.claude-assistant.outputs.output_tokens }}') || 0;
            
            if (inputTokens === 0 || outputTokens === 0) {
              console.log('No token usage data available');
              return;
            }
            
            // Claude 3.5 Sonnet pricing
            const inputCost = (inputTokens / 1000000) * 3;
            const outputCost = (outputTokens / 1000000) * 15;
            const totalCost = inputCost + outputCost;
            
            const comment = `## 💰 Claude Assistant Cost Estimate
            
            **Workflow:** Claude AI Assistant (@claude mention)
            **Status:** ${{ steps.claude-assistant.outcome || 'completed' }}
            
            ### Token Usage (Estimated)
            - Input tokens: ~${inputTokens.toLocaleString()} tokens
            - Output tokens: ~${outputTokens.toLocaleString()} tokens
            - **Total tokens:** ~${(inputTokens + outputTokens).toLocaleString()} tokens
            
            ### Cost Breakdown
            - Input cost: ~$${inputCost.toFixed(4)}
            - Output cost: ~$${outputCost.toFixed(4)}
            - **Total cost:** ~$${totalCost.toFixed(4)} (~$${totalCost.toFixed(2)})
            
            ### Budget Tracking
            - Cost per @claude interaction: ~$0.05-0.10
            - With $5 budget: ~50-100 interactions possible
            
            ---
            *💡 Tip: For cheaper reviews, ask specific questions. For comprehensive reviews, use \`/claude-review\`.*
            
            *Check [Anthropic Console](https://console.anthropic.com/) for actual usage.*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
